<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1000" viewBox="0 0 1500 1000"><rect width="1500" height="1000" fill="#0f141b"/><g font-family="JetBrains Mono, monospace"><text x="80" y="105" fill="#fff3c4" font-size="58" font-weight="700">One question. An auditable path.</text><text x="84" y="156" fill="#56cfe1" font-size="25">The model proposes. The researcher approves. The application enforces.</text><g font-size="23" text-anchor="middle"><g transform="translate(80 255)"><rect width="290" height="150" rx="24" fill="#172a3a" stroke="#9b5de5" stroke-width="3"/><text x="145" y="62" fill="#fff3c4">Clarify</text><text x="145" y="104" fill="#aeb6c4" font-size="18">pivotal questions</text></g><g transform="translate(425 255)"><rect width="290" height="150" rx="24" fill="#172a3a" stroke="#56cfe1" stroke-width="3"/><text x="145" y="62" fill="#fff3c4">Plan</text><text x="145" y="104" fill="#aeb6c4" font-size="18">editable queries</text></g><g transform="translate(770 255)"><rect width="290" height="150" rx="24" fill="#172a3a" stroke="#ff6b6b" stroke-width="3"/><text x="145" y="62" fill="#fff3c4">Discover</text><text x="145" y="104" fill="#aeb6c4" font-size="18">sources + provenance</text></g><g transform="translate(1115 255)"><rect width="290" height="150" rx="24" fill="#172a3a" stroke="#fff3c4" stroke-width="3"/><text x="145" y="62" fill="#fff3c4">Curate</text><text x="145" y="104" fill="#aeb6c4" font-size="18">human staging</text></g><g transform="translate(250 590)"><rect width="300" height="150" rx="24" fill="#172a3a" stroke="#ff6b6b" stroke-width="3"/><text x="150" y="62" fill="#fff3c4">Consent</text><text x="150" y="104" fill="#aeb6c4" font-size="18">before full text</text></g><g transform="translate(600 590)"><rect width="300" height="150" rx="24" fill="#172a3a" stroke="#56cfe1" stroke-width="3"/><text x="150" y="62" fill="#fff3c4">Evidence</text><text x="150" y="104" fill="#aeb6c4" font-size="18">page-aware index</text></g><g transform="translate(950 59