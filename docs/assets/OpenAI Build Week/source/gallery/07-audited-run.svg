d—not hidden.</text><rect x="540" y="785" width="700" height="16" rx="8" fill="#2b394a"/><rect x="540" y="785" width="644" height="16" rx="8" fill="#56cfe1"/><text x="80" y="920" fill="#8e9aaf" font-size="19">Functional acceptance, not a claim of exhaustive retrieval or automatic entailment.</text></g></svg>
